name: Feature request
description: Suggest an enhancement or new capability
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. Please describe the **problem** before the solution — it makes the proposal much easier to evaluate.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Who is affected? What is the current friction?
      placeholder: |
        When I do X, I want Y to happen, but currently Z happens instead.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change? Be as concrete as you can — link to existing code, schemas, or docs if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out, and why
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Mockups, links, prior art, related issues, related repos in the Skill Graph ecosystem
    validations:
      required: false
  - type: checkboxes
    id: ecosystem
    attributes:
      label: Cross-repo impact
      description: Which sibling repos would also be affected by this change?
      options:
        - label: skill-metadata-protocol (schema / spec)
        - label: skill-graph (tooling)
        - label: skill-audit-loop (audit pipeline)
        - label: skills (library content)
